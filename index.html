<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Nick | Portfolio</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <nav class="navbar">
            <div class="nav-logo">Nick</div>
            <ul class="nav-links">
                <li><a href="#home">Home</a></li>
                <li><a href="#about">About</a></li>
                <li class="dropdown">
                    <a href="#projects">Projects ▾</a>
                    <ul class="dropdown-menu">
                        <li><a href="#">Music Player</a></li>
                        <li><a href="#">Python Projects</a></li>
                    </ul>
                </li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
        <canvas id="stars"></canvas>
        <div class="loader" id="loader">
            <div class="loader-content">
                <p class="loader-welcome" id="loader-welcome"></p>
                <div class="loader-text">Loading<span class="dots">...</span></div>
                <div class="loader-bar">
                    <div class="loader-fill" id="loader-fill"></div>
                </div>
                <p class="loader-percent" id="loader-percent">0%</p>
            </div>
        </div>

        <section class="hero" id="home">
            <div class="hero-content">
                <p class="hero-greeting animate-left">Hi, I'm</p>
                <h1 class="hero-name animate-right">
                    <span id="typewriter"></span><span class="cursor">_</span></h1>
                <p class="hero-title animate-bottom">Aspiring Software Engineer</p>
                <p class="hero-sub animate-bottom">Building my skills one project at a time.</p>
                <a href="https://github.com/nickkcodes" class="hero-btn animate-bottom">View My Github</a>
            </div>
        </section>

        <section class="about" id="about">
            
        </section>

        <section class="skills" id="skills">
            <div class="skills-header">
                <span class="skills-icon">⚙</span>
                <h2 class="skills-title"><span>#</span> Skills.json</h2>
            </div>
            <div class="skills-canvas-wrap">
                <canvas id="skillsCanvas"></canvas>
            </div>
            <div class="skills-hint">
                <div class="skills-hint-pill">🌐 Drag to explore skills universe</div>
            </div>

        <script src="script.js"></script>
    </body>
</html>
